<div id="median-related-wrapper" style="display:none; width:100%; box-sizing:border-box;">
  <div class="median-related-box">
    <div class="median-header">
      <h3 class="median-title">Baca Juga</h3>
      <a href="/search" class="median-more">Arsip Blog &rarr;</a>
    </div>
    
    <div id="median-content" class="median-container">
      <div class="median-card skeleton"></div>
      <div class="median-card skeleton"></div>
    </div>
  </div>
</div>

<style>
/* --- Dukungan Untuk MedianUI (tulis ulang) --- */
.median-related-box {
  margin: 30px 0;
  display: block;
  font-family: var(--fontBody, sans-serif);
  width: 100%;
  clear: both;
}

/* Gaya Judul */
.median-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--contentBg-alt, #f0f0f0);
  padding-bottom: 10px;
}
.median-title {
  font-size: 1.1rem;
  font-weight: 700;
  margin: 0;
  color: var(--themeC, #333);
  position: relative;
}
.median-title::after {
  content: '';
  position: absolute;
  bottom: -12px;
  left: 0;
  width: 40px;
  height: 2px;
  background: var(--themeLink, #8875f5);
}
.median-more {
  font-size: 0.8rem;
  color: var(--themeLink, #8875f5);
  text-decoration: none;
  font-weight: 600;
}

/* Container Flexbox */
.median-container {
  display: flex;
  flex-wrap: wrap;
  gap: 15px; 
  margin: 0 -5px;
}

/* Gaya Kartu */
.median-card {
  /* Mobile: 2 Kolom (50% - gap) */
  width: calc(50% - 10px); 
  display: flex;
  flex-direction: column;
  background: var(--contentBg, #fff);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  text-decoration: none !important;
  border: 1px solid var(--contentBd-color, rgba(0,0,0,0.05));
  box-sizing: border-box;
  transition: transform 0.2s;
  flex-grow: 0;
  flex-shrink: 0;
}

/* Desktop: 3 Kolom */
@media (min-width: 600px) {
  .median-card {
    width: calc(33.333% - 10px);
  }
}

.median-card:hover {
  transform: translateY(-3px);
  border-color: var(--themeLink, #8875f5);
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* Gambar Thumbnail */
.median-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--contentBg-alt, #eee);
  position: relative;
  overflow: hidden;
}
.median-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s;
}

/* Info Teks */
.median-info {
  padding: 10px;
}
.median-tag {
  font-size: 9px;
  text-transform: uppercase;
  color: var(--themeLink, #8875f5);
  font-weight: 700;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 4px;
}
.median-post-title {
  font-size: 13px;
  line-height: 1.4;
  font-weight: 600;
  color: var(--themeC, #333);
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Skeleton Loading (Agar tidak kaget saat loading) */
.skeleton {
  background: var(--contentBg-alt, #eee);
  height: 180px;
  animation: pulse 1s infinite alternate;
}
@keyframes pulse { from {opacity: 0.6;} to {opacity: 1;} }
</style>

<script>
//<![CDATA[
(function() {
  const config = {
    maxPosts: 6, 
    depth: 50,  
    noImage: "data:image/png;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
  };

  // Helper: Ambil elemen pembungkus postingan
  function getPostTarget() {
    // Mencoba beberapa selector standar MedianUI/Blogger
    return document.getElementById('postBody') || 
           document.querySelector('.post-body') || 
           document.querySelector('.entry-content') ||
           document.querySelector('.post-content');
  }

  // Helper: Ambil konteks (judul & label)
  function getContext() {
    const title = document.title.split('|')[0].trim();
    // Cari label 
    const labelEls = document.querySelectorAll('.post-labels a, span.label a, a[rel="tag"]');
    let labels = [];
    if(labelEls.length > 0) {
      labelEls.forEach(el => labels.push(el.innerText.trim().toLowerCase()));
    }
    
    // Pecah judul jadi keyword
    const stopWords = ["dan", "yang", "di", "ke", "dari", "ini", "itu", "untuk", "cara", "tips", "adalah", "video", "terbaru"];
    const keywords = title.toLowerCase().replace(/[^a-z0-9\s]/gi, '').split(' ')
      .filter(w => w.length > 3 && !stopWords.includes(w));

    return { labels, keywords };
  }

  async function initWidget() {
    // Validasi Halaman (Hanya muncul di halaman postingan .html)
    if (!window.location.href.match(/\.html/)) return;

    // Cari Target Suntik
    const targetEl = getPostTarget();
    const wrapper = document.getElementById('median-related-wrapper');
    
    if (!targetEl || !wrapper) {
      console.log('median Widget: Target element not found.');
      return;
    }

    // Pindahkan Widget (Suntik)
    targetEl.parentNode.insertBefore(wrapper, targetEl.nextSibling);
    wrapper.style.display = "block";

    const context = getContext();

    try {
      // Ambil total postingan dulu
      const resTotal = await fetch('/feeds/posts/summary?alt=json&max-results=0');
      const jsonTotal = await resTotal.json();
      const totalPosts = parseInt(jsonTotal.feed.openSearch$totalResults.$t);

      // Tentukan titik acak untuk postingan lama
      const maxIndex = Math.max(1, totalPosts - config.depth);
      const randomIndex = Math.floor(Math.random() * maxIndex) + 1;

      // Fetch PARALEL (Terbaru & Random Lama)
      const [resRecent, resOld] = await Promise.all([
        fetch(`/feeds/posts/summary?alt=json&max-results=${config.depth}`),
        fetch(`/feeds/posts/summary?alt=json&start-index=${randomIndex}&max-results=${config.depth}`)
      ]);

      const dataRecent = await resRecent.json();
      const dataOld = await resOld.json();

      // Gabung data (cegah duplikat)
      const allEntries = [...(dataRecent.feed.entry || []), ...(dataOld.feed.entry || [])];
      
      processEntries(allEntries, context);

    } catch (e) {
      console.error("median Widget Error:", e);
      document.getElementById('median-content').innerHTML = '<small>Gagal memuat rekomendasi.</small>';
    }
  }

  function processEntries(entries, context) {
    let candidates = [];
    const currentUrl = window.location.href.split('?')[0];
    const addedLinks = new Set(); 

    entries.forEach(entry => {
      const link = entry.link.find(l => l.rel === 'alternate').href;
      
      // Filter: Jangan masukkan postingan yg sedang dibuka atau duplikat
      if (link.includes(currentUrl) || addedLinks.has(link)) return;
      addedLinks.add(link);

      const title = entry.title.$t;
      let score = 0;
      let tagName = 'Arsip';
  
      // Cek Label (+5 poin)
      if (entry.category) {
        entry.category.forEach(cat => {
          if (context.labels.includes(cat.term.toLowerCase())) {
            score += 5;
            tagName = cat.term;
          }
        });
      }

      // Cek Judul (+2 poin per kata)
      const titleLower = title.toLowerCase();
      context.keywords.forEach(kw => {
        if (titleLower.includes(kw)) score += 2;
      });

      // Ambil Gambar (Resolusi w300 agar tajam & cepat)
      let img = config.noImage;
      if (entry.media$thumbnail) {
        img = entry.media$thumbnail.url.replace(/\/s[0-9]+(\-c)?\//, "/w300-h168-p-k-no-nu/");
      }

      // Masukkan ke kandidat (jika skor > 0 atau random fill)
      candidates.push({
        title: title,
        link: link,
        img: img,
        tag: tagName,
        finalScore: score + Math.random() 
      });
    });

    // Urutkan dari skor tertinggi
    candidates.sort((a, b) => b.finalScore - a.finalScore);

    // Ambil top 6
    renderHTML(candidates.slice(0, config.maxPosts));
  }

  function renderHTML(posts) {
    const container = document.getElementById('median-content');
    
    if (posts.length === 0) {
      container.innerHTML = '<div style="width:100%;text-align:center;opacity:0.6;font-size:12px">Belum ada rekomendasi.</div>';
      return;
    }

    let html = '';
    posts.forEach(p => {
      html += `
        <a href="${p.link}" class="median-card" title="${p.title}">
          <div class="median-thumb">
            <img src="${p.img}" alt="${p.title}" loading="lazy">
          </div>
          <div class="median-info">
            <span class="median-tag">${p.tag}</span>
            <h4 class="median-post-title">${p.title}</h4>
          </div>
        </a>
      `;
    });
    container.innerHTML = html;
  }

  // Gunakan 'load' event agar DOM MedianUI sepenuhnya siap
  window.addEventListener('load', initWidget);

})();
//]]>
</script>
